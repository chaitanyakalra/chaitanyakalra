name: Generate Snake

on:
  # rebuild twice a day so the snake stays current
  schedule:
    - cron: "0 */12 * * *"
  # allow manual runs from the Actions tab
  workflow_dispatch:
  # rebuild on push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs from the contribution graph
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#6B4F3A&color_dots=#161A1F,#2D5A3D,#3FB56A,#4CC776,#8FE9AB
            dist/github-snake-dark.svg?color_snake=#6B4F3A&color_dots=#161A1F,#2D5A3D,#3FB56A,#4CC776,#8FE9AB

      - name: Publish SVGs to the 'output' branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
