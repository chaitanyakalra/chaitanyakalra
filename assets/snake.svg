<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 880 200" width="880" height="200" fill="none" role="img" aria-label="Chaitanya — contribution snake">
  <style>
    @keyframes bob      { 0%,100%{transform:translateY(0)}      50%{transform:translateY(-5px)} }
    @keyframes breathe  { 0%,100%{transform:scale(1)}           50%{transform:scale(1.035)} }
    @keyframes blink    { 0%,90%,100%{transform:scaleY(1)}      94%,97%{transform:scaleY(.08)} }
    @keyframes glow     { 0%,100%{opacity:.5}                   50%{opacity:1} }
    @keyframes floatp   { 0%{opacity:0;transform:translate(0,0) scale(.5)} 25%{opacity:.85} 100%{opacity:0;transform:translate(-7px,-32px) scale(1)} }
    @keyframes cellpop  { 0%,55%{opacity:.18;transform:scale(.9)} 70%{opacity:1;transform:scale(1.14)} 100%{opacity:.18;transform:scale(.9)} }
    @keyframes shimmerf { 0%,100%{opacity:0} 45%{opacity:.8} }
    @keyframes twinkle  { 0%,100%{opacity:.4} 50%{opacity:.85} }

    .snake  { animation: bob 5.6s cubic-bezier(.45,0,.55,1) infinite; }
    .head   { transform-box:fill-box; transform-origin:center; animation: breathe 4.2s ease-in-out infinite; }
    .eyes   { transform-box:fill-box; transform-origin:center; animation: blink 5s ease-in-out infinite; }
    .eg     { animation: glow 3.6s ease-in-out infinite; }
    .p      { transform-box:fill-box; transform-origin:center; }
    .p1{animation:floatp 3.6s ease-in-out infinite} .p2{animation:floatp 3.6s ease-in-out .9s infinite} .p3{animation:floatp 3.6s ease-in-out 1.9s infinite}
    .cell   { transform-box:fill-box; transform-origin:center; }
    .c1{animation:cellpop 3s ease-in-out infinite} .c2{animation:cellpop 3s ease-in-out .55s infinite} .c3{animation:cellpop 3s ease-in-out 1.1s infinite}
    .shimmer{ animation: shimmerf 4s ease-in-out infinite; }
    .tw{ animation: twinkle 4s ease-in-out infinite; }
  </style>

  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#3B424B"/>
      <stop offset=".48" stop-color="#2D3137"/>
      <stop offset="1"   stop-color="#4A3428"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#363D46"/>
      <stop offset=".55" stop-color="#2A2E34"/>
      <stop offset="1"   stop-color="#3E2C20"/>
    </linearGradient>
    <radialGradient id="eyeg" cx=".5" cy=".5" r=".5">
      <stop offset="0"  stop-color="#B7F5CE"/>
      <stop offset=".5" stop-color="#4CC776"/>
      <stop offset="1"  stop-color="#4CC776" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amb" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#4CC776" stop-opacity=".16"/>
      <stop offset="1" stop-color="#4CC776" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect x="3.5" y="3.5" width="13" height="13" rx="3.5" fill="#161A1F"/>
    </pattern>
    <filter id="soft"   x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.2"/></filter>
    <filter id="softbig" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="6"/></filter>
    <path id="bodyPath" d="M 58,150 C 150,150 176,96 270,100 C 360,104 406,150 500,146 C 586,142 622,104 690,110"/>
  </defs>

  <!-- ambient emerald glow behind the head -->
  <ellipse cx="700" cy="104" rx="158" ry="92" fill="url(#amb)"/>

  <!-- subtle contribution-grid backdrop -->
  <rect x="44" y="34" width="792" height="140" fill="url(#grid)" opacity=".32"/>
  <g>
    <rect class="tw" x="107" y="57" width="13" height="13" rx="3.5" fill="#1E3A2A"/>
    <rect class="tw" x="187" y="117" width="13" height="13" rx="3.5" fill="#245234"/>
    <rect class="tw" x="247" y="77" width="13" height="13" rx="3.5" fill="#2D5A3D" style="animation-delay:1.2s"/>
    <rect class="tw" x="347" y="137" width="13" height="13" rx="3.5" fill="#1E3A2A" style="animation-delay:.6s"/>
    <rect class="tw" x="447" y="57" width="13" height="13" rx="3.5" fill="#2D5A3D" style="animation-delay:1.8s"/>
    <rect class="tw" x="547" y="97" width="13" height="13" rx="3.5" fill="#245234" style="animation-delay:.9s"/>
    <rect class="tw" x="607" y="137" width="13" height="13" rx="3.5" fill="#1E3A2A" style="animation-delay:2.1s"/>
  </g>

  <!-- cells being collected (right of the head): glow + ripple -->
  <g>
    <circle cx="758" cy="70"  r="2" fill="none" stroke="#4CC776" stroke-width="2"><animate attributeName="r" values="2;17" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values=".75;0" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="792" cy="104" r="2" fill="none" stroke="#4CC776" stroke-width="2"><animate attributeName="r" values="2;17" dur="3s" begin=".55s" repeatCount="indefinite"/><animate attributeName="opacity" values=".75;0" dur="3s" begin=".55s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="74"  r="2" fill="none" stroke="#4CC776" stroke-width="2"><animate attributeName="r" values="2;17" dur="3s" begin="1.1s" repeatCount="indefinite"/><animate attributeName="opacity" values=".75;0" dur="3s" begin="1.1s" repeatCount="indefinite"/></circle>
    <g class="cell c1"><rect x="750" y="62" width="15" height="15" rx="4" fill="#4CC776"/></g>
    <g class="cell c2"><rect x="784" y="96" width="15" height="15" rx="4" fill="#3FB56A"/></g>
    <g class="cell c3"><rect x="812" y="66" width="15" height="15" rx="4" fill="#8FE9AB"/></g>
  </g>

  <!-- SNAKE -->
  <g class="snake">
    <!-- soft drop shadow -->
    <use xlink:href="#bodyPath" stroke="#000" stroke-opacity=".28" stroke-width="26" stroke-linecap="round" transform="translate(0,8)" filter="url(#softbig)"/>
    <!-- body -->
    <use xlink:href="#bodyPath" stroke="url(#body)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- pixel-scale hint -->
    <use xlink:href="#bodyPath" stroke="#1B1F24" stroke-opacity=".35" stroke-width="24" stroke-linecap="round" stroke-dasharray="1.5 18"/>
    <!-- top gloss -->
    <use xlink:href="#bodyPath" stroke="#F5F5F5" stroke-opacity=".11" stroke-width="7" stroke-linecap="round" transform="translate(0,-6)"/>
    <!-- travelling shimmer -->
    <ellipse class="shimmer" rx="7" ry="7" fill="#D6EFE0">
      <animateMotion dur="4s" repeatCount="indefinite" rotate="auto"><mpath xlink:href="#bodyPath"/></animateMotion>
    </ellipse>

    <!-- floating particles near head -->
    <circle class="p p1" cx="700" cy="86" r="2.4" fill="#8FE9AB"/>
    <circle class="p p2" cx="714" cy="92" r="2"   fill="#7FE3D4"/>
    <circle class="p p3" cx="690" cy="90" r="1.8" fill="#B7F5CE"/>

    <!-- HEAD -->
    <g transform="translate(654,78)"><g class="head">
      <!-- white shirt collar (two folded flaps meeting in a V) -->
      <path d="M 28,53 L 37,64 L 37,56 Z" fill="#F5F5F5"/>
      <path d="M 46,53 L 37,64 L 37,56 Z" fill="#E4E8EB"/>
      <path d="M 34,54 L 37,61 L 40,54 Z" fill="#4A3428" opacity=".9"/>
      <circle cx="37" cy="57" r="1.3" fill="#C4CAD0"/>
      <!-- face -->
      <rect x="5" y="4" width="64" height="56" rx="19" fill="url(#face)" stroke="#15181C" stroke-width="1.4"/>
      <ellipse cx="37" cy="15" rx="23" ry="6.5" fill="#F5F5F5" opacity=".08"/>
      <ellipse cx="37" cy="46" rx="21" ry="9" fill="#4A3428" opacity=".35"/>
      <!-- eye glow -->
      <circle class="eg" cx="24" cy="32" r="12" fill="url(#eyeg)" filter="url(#soft)"/>
      <circle class="eg" cx="50" cy="32" r="12" fill="url(#eyeg)" filter="url(#soft)"/>
      <!-- eyes (blink) -->
      <g class="eyes">
        <circle cx="24" cy="32" r="6" fill="#8FE9AB"/>
        <circle cx="50" cy="32" r="6" fill="#8FE9AB"/>
        <circle cx="26" cy="30" r="1.7" fill="#F5F5F5"/>
        <circle cx="52" cy="30" r="1.7" fill="#F5F5F5"/>
      </g>
      <!-- glasses (beige, soft metallic) -->
      <g stroke="#D8B08A" stroke-width="2.3" fill="none" opacity=".95" stroke-linecap="round">
        <circle cx="24" cy="32" r="11"/>
        <circle cx="50" cy="32" r="11"/>
        <path d="M 35,31 q 2,-3.2 4,0"/>
        <path d="M 13.5,30 l -8,-3"/>
        <path d="M 60.5,30 l 8,-3"/>
      </g>
    </g></g>
  </g>
</svg>
